name: Snowflake Deployment with Workload Identity Federation

on:
  push:
    branches: [ main, test, dev ]

permissions:
  id-token: write  # For obtaining OIDC token
  contents: read   # For reading repository contents

jobs:
  deploy:
    name: "Deploy to ${{ github.ref_name }}"
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ORGANIZATION: ${{ secrets.SNOWFLAKE_ORGANIZATION }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_AUTHENTICATOR: WORKLOAD_IDENTITY
      SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER: OIDC
      SNOWFLAKE_AUDIENCE: ${{ secrets.SNOWFLAKE_AUDIENCE }}
      SF_ENABLE_EXPERIMENTAL_AUTHENTICATION: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Get OIDC Token
      id: id-token
      uses: actions/github-script@v7
      with:
        script: |
          try {
            const idToken = await core.getIDToken('https://github.com/${{ github.repository_owner }}');
            core.exportVariable('SNOWFLAKE_TOKEN', idToken);
            console.log('ID token obtained');
          } catch (error) {
            console.error(error);
            core.setFailed(`ID token retrieval failed: ${error.message}`);
          }

    # 0. Test Snowflake connection
    - name: Set up Snowflake CLI
      uses: snowflakedb/snowflake-cli-action@v2.0
      with:
        use-oidc: true
        cli-version: "3.12.0"
    - name: test connection
      run: snow connection test --temporary-connection

    # 1. Map branch name to environment variable
    - name: Set Environment Mapping
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "ENV_NAME=PROD" >> $GITHUB_ENV
        elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
          echo "ENV_NAME=TEST" >> $GITHUB_ENV
        else
          echo "ENV_NAME=DEV" >> $GITHUB_ENV
        fi

    # 2. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4

    # 3. Terraform Init
    - name: Terraform Init
      run: terraform init
      working-directory: ./terraform
    
    # 4. Terraform Apply — pass GitHub Secrets into Terraform via TF_VAR_
    - name: Terraform Apply
      env:
        TF_VAR_SNOWFLAKE_ORGANIZATION: ${{ secrets.SNOWFLAKE_ORGANIZATION }}
        TF_VAR_SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
        TF_VAR_SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
        TF_VAR_SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        TF_VAR_SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
        TF_VAR_SNOWFLAKE_AUTHENTICATOR: ${{ env.SNOWFLAKE_AUTHENTICATOR }}
        TF_VAR_SNOWFLAKE_TOKEN: ${{ env.SNOWFLAKE_TOKEN }}
        TF_VAR_SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER: ${{ env.SNOWFLAKE_WORKLOAD_IDENTITY_PROVIDER }}
        TF_VAR_ENV_NAME: ${{ env.ENV_NAME }}
      run: terraform apply -auto-approve
      working-directory: ./terraform

    # 5. Setup Python for dbt
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install dbt-snowflake

    # 6. Run dbt transformations
    - name: dbt Run
      run: dbt run --target ${{ env.ENV_NAME }}








